<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Central | Premium CRUD</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #ec4899;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i {
            color: var(--primary);
        }

        /* Form Styling */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            transition: color 0.3s;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px 14px 14px 45px;
            color: var(--white);
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        input:focus + i {
            color: var(--primary);
        }

        .button-group {
            display: flex;
            gap: 12px;
        }

        button {
            cursor: pointer;
            border-radius: 12px;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, #4f46e5 100%);
            color: white;
            flex: 1;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
            filter: brightness(1.1);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--white);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* Table Styling */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }

        th {
            text-align: left;
            padding: 15px 20px;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }

        td {
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.02);
            border-top: 1px solid var(--glass-border);
            border-bottom: 1px solid var(--glass-border);
            font-size: 1rem;
        }

        td:first-child {
            border-left: 1px solid var(--glass-border);
            border-radius: 12px 0 0 12px;
        }

        td:last-child {
            border-right: 1px solid var(--glass-border);
            border-radius: 0 12px 12px 0;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.05);
        }

        .action-btns {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            padding: 0;
            justify-content: center;
            border-radius: 10px;
        }

        .btn-edit {
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
        }

        .btn-edit:hover {
            background: #f59e0b;
            color: white;
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }

        .btn-delete:hover {
            background: #ef4444;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 40px 0;
            color: var(--text-muted);
        }

        .empty-state i {
            display: block;
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        /* Custom SweetAlert2 Theme */
        .swal2-popup {
            background: #1e1b4b !important;
            color: var(--text-main) !important;
            border-radius: 20px !important;
            border: 1px solid var(--glass-border) !important;
        }
        .swal2-title, .swal2-html-container {
            color: var(--text-main) !important;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>User Management</h1>
        <p>Manage your students and members with premium interface</p>
    </header>

    <!-- Form Section -->
    <div class="glass-card">
        <h2 class="section-title"><i class="fa-solid fa-user-plus"></i> <span id="formTitle">Add New User</span></h2>
        
        <form id="userForm">
            <input type="hidden" id="userId">
            
            <div class="form-grid">
                <div class="input-group">
                    <i class="fa-solid fa-signature"></i>
                    <input type="text" id="name" placeholder="Full Name" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-id-card"></i>
                    <input type="text" id="nim" placeholder="NIM / ID" required>
                </div>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-primary">
                    <i class="fa-solid fa-paper-plane"></i>
                    <span id="submitBtnText">Save User</span>
                </button>
                <button type="button" class="btn-secondary" onclick="resetForm()">
                    <i class="fa-solid fa-rotate-right"></i>
                    Reset
                </button>
            </div>
        </form>
    </div>

    <!-- Table Section -->
    <div class="glass-card">
        <h2 class="section-title"><i class="fa-solid fa-users-viewfinder"></i> User List</h2>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>NIM</th>
                        <th style="width: 120px;">Actions</th>
                    </tr>
                </thead>
                <tbody id="userTable">
                    <!-- Loaded via JS -->
                </tbody>
            </table>
            <div id="tableEmpty" class="empty-state" style="display: none;">
                <i class="fa-solid fa-folder-open"></i>
                <p>No users found. Start by adding one!</p>
            </div>
        </div>
    </div>
</div>

<script>
    const BASE_URL = "/api/users";

    // Utility for toasts
    const Toast = Swal.mixin({
        toast: true,
        position: 'top-end',
        showConfirmButton: false,
        timer: 3000,
        timerProgressBar: true,
        background: '#1e1b4b',
        color: '#f8fafc'
    });

    // ========================
    // LOAD USERS
    // ========================
    function loadUsers() {
        $.ajax({
            url: BASE_URL,
            type: "GET",
            success: function (users) {
                const $table = $("#userTable");
                $table.empty();

                if (users.length === 0) {
                    $("#tableEmpty").show();
                    return;
                }

                $("#tableEmpty").hide();
                users.forEach(function (user) {
                    $table.append(`
                        <tr>
                            <td style="font-weight: 600;">${user.name}</td>
                            <td style="color: var(--text-muted);">${user.nim}</td>
                            <td>
                                <div class="action-btns">
                                    <button class="btn-icon btn-edit" 
                                        onclick="editUser('${user.id}', '${escapeHtml(user.name)}', '${escapeHtml(user.nim)}')">
                                        <i class="fa-solid fa-pen-to-square"></i>
                                    </button>
                                    <button class="btn-icon btn-delete"
                                        onclick="deleteUser('${user.id}')">
                                        <i class="fa-solid fa-trash-can"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `);
                });
            },
            error: function (xhr) {
                console.error(xhr);
                Toast.fire({ icon: 'error', title: 'Failed to load users' });
            }
        });
    }

    // ========================
    // ADD / UPDATE USER
    // ========================
    $("#userForm").submit(function (e) {
        e.preventDefault();

        const id = $("#userId").val();
        const userData = {
            name: $("#name").val(),
            nim: $("#nim").val()
        };

        const isUpdate = !!id;
        const method = isUpdate ? "PUT" : "POST";
        const url = isUpdate ? `${BASE_URL}/${id}` : BASE_URL;

        $.ajax({
            url: url,
            type: method,
            contentType: "application/json",
            data: JSON.stringify(userData),
            beforeSend: function() {
                Swal.showLoading();
            },
            success: function () {
                Swal.close();
                Toast.fire({
                    icon: 'success',
                    title: isUpdate ? 'User updated successfully' : 'User added successfully'
                });
                resetForm();
                loadUsers();
            },
            error: function (xhr) {
                Swal.close();
                Toast.fire({
                    icon: 'error',
                    title: `Error: ${xhr.statusText || 'Operation failed'}`
                });
            }
        });
    });

    // ========================
    // EDIT USER
    // ========================
    function editUser(id, name, nim) {
        $("#userId").val(id);
        $("#name").val(name);
        $("#nim").val(nim);

        $("#formTitle").text("Edit User Profile");
        $("#submitBtnText").text("Update User");
        
        // Scroll to form nicely
        window.scrollTo({ top: 0, behavior: 'smooth' });
        $("#name").focus();
    }

    // ========================
    // DELETE USER
    // ========================
    function deleteUser(id) {
        Swal.fire({
            title: 'Are you sure?',
            text: "You won't be able to revert this!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#6366f1',
            cancelButtonColor: '#ef4444',
            confirmButtonText: 'Yes, delete it!',
            background: '#1e1b4b',
            color: '#f8fafc'
        }).then((result) => {
            if (result.isConfirmed) {
                $.ajax({
                    url: BASE_URL + "/" + id,
                    type: "DELETE",
                    success: function () {
                        Toast.fire({
                            icon: 'success',
                            title: 'User has been deleted.'
                        });
                        loadUsers();
                    },
                    error: function () {
                        Toast.fire({
                            icon: 'error',
                            title: 'Failed to delete user.'
                        });
                    }
                });
            }
        });
    }

    // ========================
    // RESET FORM
    // ========================
    function resetForm() {
        $("#userId").val("");
        $("#name").val("");
        $("#nim").val("");
        $("#formTitle").text("Add New User");
        $("#submitBtnText").text("Save User");
    }

    // Escape HTML to prevent XSS
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // INIT LOAD
    $(document).ready(function () {
        loadUsers();
    });
</script>

</body>
</html>
